<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mappa di Lara Kraft</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e0d0;font-family:'Montserrat',sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(180,150,80,0.2);background:rgba(10,10,15,0.98);z-index:1000;flex-shrink:0}
.hl h1{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;letter-spacing:3px;color:#c8a84b;text-transform:uppercase}
.hl p{font-size:8px;letter-spacing:2px;color:rgba(200,168,75,0.4);text-transform:uppercase;margin-top:2px}
.hr{text-align:right}
.hr .ded{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:rgba(232,224,208,0.4)}
.hr .nom{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:#c8a84b;letter-spacing:2px}
#legend{position:absolute;top:62px;left:14px;background:rgba(10,10,15,0.9);border:1px solid rgba(200,168,75,0.18);padding:8px 12px;z-index:900;display:flex;flex-direction:column;gap:6px;border-radius:4px}
.li{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(232,224,208,0.55)}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lg{background:#c8a84b;box-shadow:0 0 6px rgba(200,168,75,0.4)}
.lb{background:#4a9eca;box-shadow:0 0 6px rgba(74,158,202,0.4)}
.lv{background:#50c878;box-shadow:0 0 6px rgba(80,200,120,0.4)}
#counter{position:absolute;top:62px;right:14px;background:rgba(10,10,15,0.9);border:1px solid rgba(200,168,75,0.18);padding:6px 12px;z-index:900;text-align:center;border-radius:4px}
#cn{font-family:'Cormorant Garamond',serif;font-size:20px;color:#c8a84b;line-height:1}
#cl{font-size:7px;letter-spacing:2px;color:rgba(200,168,75,0.38);text-transform:uppercase}
#map{flex:1;width:100%}

/* === PANEL === */
#panel{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(135deg,rgba(12,12,18,0.99),rgba(16,12,8,0.99));transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.16,1,0.3,1);z-index:1000;border-top:1px solid rgba(180,150,80,0.22);backdrop-filter:blur(16px);max-height:50vh;overflow:hidden;display:flex}
#panel.visible{transform:translateY(0)}
#panel.bt{border-top-color:rgba(74,158,202,0.35)}
#panel.vt{border-top-color:rgba(80,200,120,0.35)}
#piw{width:200px;min-width:200px;overflow:hidden;flex-shrink:0;background:#0f0f18;display:flex;align-items:center;justify-content:center;position:relative}
#pi{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.85) saturate(0.9)}
#pico{font-size:48px;color:rgba(200,168,75,0.15);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#pc{padding:18px 32px 18px 20px;flex:1;overflow-y:auto;position:relative}
#ptag{display:inline-block;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;padding:2px 8px;margin-bottom:8px;font-weight:500}
.tg{background:rgba(200,168,75,0.12);color:#c8a84b;border:1px solid rgba(200,168,75,0.25)}
.tb{background:rgba(74,158,202,0.12);color:#4a9eca;border:1px solid rgba(74,158,202,0.25)}
.tv{background:rgba(80,200,120,0.12);color:#50c878;border:1px solid rgba(80,200,120,0.25)}
#ptit{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:#f0e8d8;margin-bottom:2px;letter-spacing:1px;line-height:1.15}
#psub{font-size:9px;letter-spacing:2px;color:rgba(200,168,75,0.5);text-transform:uppercase;margin-bottom:14px;font-weight:300}
#ptxt{font-size:12.5px;line-height:1.82;color:rgba(232,224,208,0.72);font-weight:300}
#pcl{position:absolute;top:14px;right:14px;background:none;border:1px solid rgba(200,168,75,0.22);color:#c8a84b;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;border-radius:2px;z-index:10}
#pcl:hover{background:rgba(200,168,75,0.1);border-color:#c8a84b}
#hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(10,10,15,0.85);border:1px solid rgba(200,168,75,0.15);padding:7px 16px;font-size:9px;letter-spacing:2px;color:rgba(200,168,75,0.45);text-transform:uppercase;z-index:900;pointer-events:none;transition:opacity 0.5s;white-space:nowrap}
#hint.hidden{opacity:0}

/* === COUNTDOWN TIMER === */
#timerBox{position:absolute;top:62px;left:50%;transform:translateX(-50%);background:rgba(10,10,15,0.92);border:1px solid rgba(255,71,87,0.3);padding:8px 16px;z-index:900;text-align:center;border-radius:4px;display:none}
#timerLabel{font-size:7px;letter-spacing:2px;color:rgba(255,71,87,0.5);text-transform:uppercase}
#timerCount{font-family:'Cormorant Garamond',serif;font-size:22px;color:#ff4757;line-height:1;margin-top:2px;letter-spacing:1px}
#timerBox.expired #timerCount{animation:timerBlink 1s infinite}
@keyframes timerBlink{0%,100%{opacity:1}50%{opacity:0.3}}
.timer-marker{font-family:'Montserrat',sans-serif;font-size:8px;color:#ff4757;background:rgba(10,10,15,0.9);border:1px solid rgba(255,71,87,0.3);padding:2px 6px;border-radius:3px;white-space:nowrap;letter-spacing:1px;text-transform:uppercase}
@media(max-width:600px){
  #timerBox{top:auto;bottom:140px;padding:6px 12px}
  #timerCount{font-size:18px}
  #timerLabel{font-size:6px}
}

/* === GEOLOCATION === */
#geoBtn{position:absolute;bottom:18px;right:14px;width:42px;height:42px;background:rgba(10,10,15,0.92);border:1px solid rgba(200,168,75,0.22);color:#c8a84b;font-size:20px;cursor:pointer;z-index:900;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all 0.25s;line-height:1}
#geoBtn:hover,#geoBtn.active{background:rgba(200,168,75,0.15);border-color:#c8a84b;box-shadow:0 0 12px rgba(200,168,75,0.2)}
#geoBtn.active{color:#fff8e0}
#geoBtn.searching{animation:geoPulse 1.5s infinite}
@keyframes geoPulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* === MARKERS === */
.pm{width:30px;height:30px;position:relative;cursor:pointer}
.pm-r{width:20px;height:20px;border-radius:50%;border:2px solid rgba(200,168,75,0.45);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:all 0.25s}
.pm-c{width:9px;height:9px;background:#c8a84b;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(200,168,75,0.5);transition:all 0.25s}
.pm-l{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Cormorant Garamond',serif;font-size:12px;color:#c8a84b;pointer-events:none;opacity:0;transition:opacity 0.2s;background:rgba(8,8,14,0.9);padding:2px 8px;border:1px solid rgba(200,168,75,0.18)}
.pm:hover .pm-r,.pm.active .pm-r{border-color:#c8a84b;width:26px;height:26px;box-shadow:0 0 10px rgba(200,168,75,0.3)}
.pm:hover .pm-c,.pm.active .pm-c{background:#fff8e0;box-shadow:0 0 14px rgba(255,248,224,0.7)}
.pm:hover .pm-l{opacity:1}
.bm{width:30px;height:30px;position:relative;cursor:pointer}
.bm-r{width:22px;height:22px;border-radius:50%;border:2px solid rgba(74,158,202,0.5);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:all 0.25s}
.bm-c{width:10px;height:10px;background:#4a9eca;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(74,158,202,0.5);transition:all 0.25s}
.bm-l{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Cormorant Garamond',serif;font-size:12px;color:#4a9eca;pointer-events:none;opacity:0;transition:opacity 0.2s;background:rgba(8,8,14,0.9);padding:2px 8px;border:1px solid rgba(74,158,202,0.2)}
.bm:hover .bm-r,.bm.active .bm-r{border-color:#4a9eca;width:28px;height:28px;box-shadow:0 0 10px rgba(74,158,202,0.3)}
.bm:hover .bm-c,.bm.active .bm-c{background:#a8d8f0;box-shadow:0 0 14px rgba(168,216,240,0.6)}
.bm:hover .bm-l{opacity:1}
.vm{width:30px;height:30px;position:relative;cursor:pointer}
.vm-r{width:18px;height:18px;border-radius:50%;border:2px solid rgba(80,200,120,0.45);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:all 0.25s}
.vm-c{width:8px;height:8px;background:#50c878;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(80,200,120,0.5);transition:all 0.25s}
.vm-l{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Cormorant Garamond',serif;font-size:11px;color:#50c878;pointer-events:none;opacity:0;transition:opacity 0.2s;background:rgba(8,8,14,0.9);padding:2px 8px;border:1px solid rgba(80,200,120,0.2)}
.vm:hover .vm-r,.vm.active .vm-r{border-color:#50c878;width:24px;height:24px;box-shadow:0 0 10px rgba(80,200,120,0.3)}
.vm:hover .vm-c,.vm.active .vm-c{background:#a0f0b8;box-shadow:0 0 14px rgba(160,240,184,0.6)}
.vm:hover .vm-l{opacity:1}

/* === MAP STYLE === */
.leaflet-container{background:#10101a}
.leaflet-tile{filter:brightness(0.62) saturate(0.3) hue-rotate(200deg)}
.leaflet-control-zoom{border:1px solid rgba(200,168,75,0.18)!important;border-radius:0!important}
.leaflet-control-zoom a{background:rgba(10,10,15,0.95)!important;color:#c8a84b!important;border-color:rgba(200,168,75,0.12)!important;border-radius:0!important;width:36px!important;height:36px!important;line-height:36px!important;font-size:18px!important}
.leaflet-control-attribution{display:none}

/* === CHAPTER SELECTOR === */
#chapters{position:absolute;top:62px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:900}
.ch-btn{background:rgba(10,10,15,0.9);border:1px solid rgba(200,168,75,0.18);padding:6px 12px;font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(232,224,208,0.5);cursor:pointer;transition:all 0.25s;white-space:nowrap}
.ch-btn:hover{border-color:rgba(200,168,75,0.5);color:#e8e0d0}
.ch-btn.active-ch{border-color:#c8a84b;color:#c8a84b;background:rgba(200,168,75,0.1)}
.ch-btn.green.active-ch{border-color:#50c878;color:#50c878;background:rgba(80,200,120,0.1)}
.ch-btn.blue.active-ch{border-color:#4a9eca;color:#4a9eca;background:rgba(74,158,202,0.1)}
.ch-btn.gold.active-ch{border-color:#c8a84b;color:#c8a84b;background:rgba(200,168,75,0.1)}
#nextChBtn{position:absolute;bottom:18px;left:14px;background:rgba(10,10,15,0.92);border:1px solid rgba(200,168,75,0.3);color:#c8a84b;font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:10px 18px;cursor:pointer;z-index:900;transition:all 0.25s}
#nextChBtn:hover{background:rgba(200,168,75,0.15);border-color:#c8a84b;box-shadow:0 0 12px rgba(200,168,75,0.2)}

/* === MOBILE === */
@media(max-width:600px){
  header{padding:8px 12px;gap:2px}
  .hl h1{font-size:14px;letter-spacing:2px}
  .hl p{font-size:7px;letter-spacing:1.5px}
  .hr .ded{font-size:9px}
  .hr .nom{font-size:13px;letter-spacing:1px}

  #legend{top:auto;bottom:55px;left:8px;padding:5px 8px;gap:4px}
  .li{font-size:7px;letter-spacing:1px;gap:5px}
  .ld{width:8px;height:8px}

  #counter{top:auto;bottom:55px;right:8px;padding:4px 8px}
  #cn{font-size:16px}
  #cl{font-size:6px}

  #hint{bottom:12px;font-size:7px;letter-spacing:1.5px;padding:5px 12px}

  #panel{flex-direction:column;max-height:70vh;overflow-y:auto}
  #piw{width:100%;min-width:unset;height:160px;flex-shrink:0}
  #pi{width:100%;height:160px;object-fit:cover}
  #pc{padding:14px 16px 24px 14px}
  #ptit{font-size:20px}
  #psub{font-size:8px;margin-bottom:10px}
  #ptxt{font-size:11.5px;line-height:1.7}
  #pcl{top:10px;right:10px;width:34px;height:34px;font-size:18px;background:rgba(10,10,15,0.85);border-color:rgba(200,168,75,0.4)}

  .pm-l,.bm-l,.vm-l{display:none}

  .leaflet-control-zoom a{width:40px!important;height:40px!important;line-height:40px!important;font-size:20px!important}
  #geoBtn{bottom:12px;right:8px;width:44px;height:44px;font-size:22px}
  #chapters{top:auto;bottom:100px;gap:4px}
  .ch-btn{padding:5px 8px;font-size:7px}
  #nextChBtn{bottom:12px;left:8px;padding:8px 14px;font-size:8px}
}

@media(max-width:380px){
  header{flex-direction:column;align-items:flex-start;gap:2px}
  .hr{text-align:left}
  .hl h1{font-size:12px;letter-spacing:1.5px}
  .hr .nom{font-size:11px}
  .hr .ded{font-size:8px}
  #piw,#pi{height:120px}
  #ptit{font-size:18px}
}
</style>
</head>
<body>
<header>
  <div class="hl">
    <h1>Canal Grande · Laguna</h1>
    <p>Viaggio di ritorno · 13 marzo</p>
  </div>
  <div class="hr">
    <div class="ded">per i suoi 34 anni —</div>
    <div class="nom">Lara Kraft</div>
  </div>
</header>
<div id="map"></div>
<div id="legend">
  <div class="li"><div class="ld lg"></div>Palazzi storici</div>
  <div class="li"><div class="ld lb"></div>Tappe del viaggio</div>
  <div class="li"><div class="ld lv"></div>Passeggiata segreta</div>
</div>
<div id="counter"><div id="cn">0</div><div id="cl">visitati</div></div>
<div id="hint">Tocca un punto per scoprirlo</div>
<div id="timerBox"><div id="timerLabel">Riva degli Schiavoni · ore 16:00</div><div id="timerCount">--:--</div></div>
<button id="geoBtn" title="La tua posizione">◎</button>
<div id="chapters">
  <button class="ch-btn green active-ch" onclick="showChapter(1)">1 · Non Ricordi</button>
  <button class="ch-btn blue" onclick="showChapter(2)">2 · Don't Puke!</button>
  <button class="ch-btn gold" onclick="showChapter(3)">3 · Queen of Venice</button>
  <button class="ch-btn" onclick="showChapter(0)">Tutto</button>
</div>
<button id="nextChBtn" onclick="goNextChapter()">Cap. 2 →</button>
<div id="panel">
  <div id="piw">
    <img id="pi" src="" alt="" style="display:none">
    <span id="pico">◈</span>
  </div>
  <div id="pc">
    <button id="pcl">×</button>
    <div id="ptag"></div>
    <div id="ptit"></div>
    <div id="psub"></div>
    <div id="ptxt"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const stops=[
  {name:"Mazzorbo",sub:"La vostra isola · Partenza ore 17:00",lat:45.4867,lng:12.4103,emoji:"⚓",
   img:"images/mazzorbo.jpg",
   text:"La vostra isola. Collegata a Burano da un ponte di legno medievale, Mazzorbo è quasi disabitata — poche centinaia di residenti, orti, silenzio totale. Il vigneto di Venissa produce la Dorona, un vitigno veneziano quasi estinto riscoperto negli anni 2000. Da qui partite il 13 marzo alle 17:00 sul taxi acqueo verso Venezia."},
  {name:"Burano",sub:"Isola delle case colorate",lat:45.4852,lng:12.4167,emoji:"🏠",
   img:"images/burano.jpg",
   text:"L'isola più fotogenica della laguna. Le case colorate non sono una trovata turistica: ogni famiglia dipingeva la propria in un colore diverso per riconoscerla dalla barca nelle nebbie invernali. La tradizione del merletto di Burano risale al XVI secolo — la regina Caterina de' Medici ne era cliente. La sera della proposta passeggerete qui sotto le luci."},
  {name:"Murano",sub:"Laguna nord · Vetro soffiato",lat:45.4583,lng:12.3535,emoji:"💎",
   img:"images/murano.jpg",
   text:"Nel 1291 la Repubblica ordinò a tutti i maestri vetrai di trasferirsi a Murano — per controllare i segreti della lavorazione. Per secoli erano gli unici al mondo capaci di produrre certi tipi di vetro. Avevano il privilegio di portare la spada e di sposare nobili veneziane. I segreti erano protetti con la vita — letteralmente."},
  {name:"Fondamenta Nuove",sub:"Ingresso nord di Venezia",lat:45.4458,lng:12.3360,emoji:"🚢",
   img:"images/fondamenta-nuove.jpg",
   text:"Il punto dove il taxi entra nel corpo di Venezia dalla laguna nord. Da qui si vede l'isola di San Michele — il cimitero di Venezia, un'isola intera dedicata ai morti con i cipressi che si stagliano sull'acqua. Stravinsky, Diaghilev e Ezra Pound sono sepolti qui."},
  {name:"Ghetto Ebraico",sub:"Cannaregio · XVI secolo",lat:45.4442,lng:12.3273,emoji:"✡",
   img:"images/ghetto-ebraico.jpg",
   text:"Il primo ghetto della storia — la parola stessa viene da 'geto', la fonderia che c'era qui. Dal 1516 gli ebrei veneziani furono confinati in questa piccola isola, le porte chiuse la notte, le case sopraelevate fino a 7 piani per mancanza di spazio. Shakespeare ambientò qui Il Mercante di Venezia, con Shylock come protagonista."},
  {name:"Stazione Santa Lucia",sub:"Capolinea del Canal Grande",lat:45.4413,lng:12.3213,emoji:"🚂",
   img:"images/stazione-santa-lucia.jpg",
   text:"L'unica stazione al mondo dove esci e sei direttamente sul Canal Grande. Inaugurata nel 1954. Davanti c'è il Ponte degli Scalzi, uno dei quattro ponti sul Canal Grande. Da qui il taxi scende verso Riva degli Schiavoni."},
  {name:"Riva degli Schiavoni",sub:"Arrivo · Bacino di San Marco",lat:45.4335,lng:12.3425,emoji:"🏁",
   img:"images/riva-degli-schiavoni.jpg",
   text:"Il vostro punto di arrivo, davanti all'Hotel Metropole. La Riva prende il nome dalle navi slave che qui attraccavano nel Medioevo. Da qui si vede la Basilica di San Marco, il Palazzo Ducale e, in lontananza, San Giorgio Maggiore. È il cartolina più famosa di Venezia — e il punto da cui avete iniziato il viaggio 24 ore prima."},
  {name:"Torcello",sub:"V sec. · La madre di Venezia",lat:45.4969,lng:12.4181,emoji:"🏛️",
   img:"",
   text:"La prima isola abitata della laguna, fondata nel V secolo — molto prima di Venezia stessa. Qui c'erano 20.000 abitanti quando San Marco non esisteva ancora. Oggi ne restano meno di 20. La cattedrale di Santa Maria Assunta contiene mosaici bizantini del XII secolo tra i più belli d'Italia. Il Ponte del Diavolo è l'unico ponte senza parapetto rimasto nella laguna nord."},
  {name:"San Michele",sub:"Isola dei morti · Cimitero di Venezia",lat:45.4480,lng:12.3465,emoji:"🪦",
   img:"",
   text:"L'isola-cimitero di Venezia, circondata da mura di mattoni rossi e cipressi. Napoleone decise nel 1807 che i morti non potevano più essere sepolti in città. Qui riposano Igor Stravinsky, Sergej Diaghilev, Ezra Pound e Joseph Brodsky. I veneziani arrivano in vaporetto con i fiori. Vista dalla laguna, sembra un giardino galleggiante."},
  {name:"San Giorgio Maggiore",sub:"1566 · Andrea Palladio",lat:45.4294,lng:12.3433,emoji:"⛪",
   img:"",
   text:"L'isola di fronte a Piazza San Marco, con la chiesa capolavoro di Palladio. Il campanile offre la vista più bella di Venezia — meglio di quello di San Marco perché da qui si vede anche San Marco stesso. Dentro, due enormi Tintoretto: L'Ultima Cena e la Raccolta della Manna."}
];
const palaces=[
  {n:"01",name:"Punta della Dogana",sub:"XVII sec. · Dogana da Mar",lat:45.4308,lng:12.3365,
   img:"images/punta-della-dogana.jpg",
   text:"Il triangolo di pietra che separa il Canal Grande dal Canale della Giudecca. Era la dogana marittima: ogni nave doveva fermarsi e pagare i dazi. Sulla sommità, una sfera dorata sorretta da due Atlanti e la Fortuna che ruota col vento. Oggi è uno dei musei d'arte contemporanea più importanti d'Europa, collezione Pinault."},
  {n:"02",name:"Santa Maria della Salute",sub:"1631 · Baldassarre Longhena",lat:45.4312,lng:12.3340,

function loadImage(url, emoji) {
  // Reset state
  pi.style.display='none';
  pico.style.display='block';
  pico.textContent=emoji||'◈';

  if(!url) return;

  // Load the local image
  pi.onload = function(){
    pi.style.display='block';
    pico.style.display='none';
  };
  pi.onerror = function(){
    pi.style.display='none';
    pico.style.display='block';
  };
  pi.src = url;
}

function showPOI(d,el,tagText,tagClass,panelClass){
  document.getElementById('ptag').textContent=tagText;

  document.getElementById('ptit').textContent=d.name;

  document.getElementById('ptxt').textContent=d.text;

  hint.classList.add('hidden');
  if(activeEl) activeEl.classList.remove('active');

}

function addMarkerTo(layer,d,cls,tagText,tagClass,panelClass){
  var prefixes={pm:['pm-r','pm-c','pm-l'],bm:['bm-r','bm-c','bm-l'],vm:['vm-r','vm-c','vm-l']};
  var p=prefixes[cls];
  var inner='<div class="'+p[0]+'"></div><div class="'+p[1]+'"></div><div class="'+p[2]+'">'+d.name+'</div>';
  var icon=L.divIcon({html:'<div class="'+cls+'">'+inner+'</div>',className:'',iconSize:[30,30],iconAnchor:[15,15]});
  var m=L.marker([d.lat,d.lng],{icon:icon});
  m.on('click',function(){showPOI(d,this.getElement().querySelector('.'+cls),tagText,tagClass,panelClass);});
  layer.addLayer(m);
}

// Chapter switching
function showChapter(ch){
  closePanel();
  visited=0;document.getElementById('cn').textContent='0';
  // Remove all layers
  map.removeLayer(ch1Layer);map.removeLayer(ch2Layer);map.removeLayer(ch3Layer);
  // Update buttons
  var btns=document.querySelectorAll('.ch-btn');
  btns.forEach(function(b){b.classList.remove('active-ch');});
  currentCh=ch;

  var legend=document.getElementById('legend');
  var nextBtn=document.getElementById('nextChBtn');

  if(ch===1){
    ch1Layer.addTo(map);
    btns[0].classList.add('active-ch');
    map.setView([45.4400,12.3320],14);
    legend.innerHTML='<div class="li"><div class="ld lv"></div>Passeggiata segreta</div>';
    document.querySelector('.hl h1').textContent='Cap. 1 · Non Ricordi';
    document.querySelector('.hl p').textContent='Passeggiata segreta · Cannaregio';
    nextBtn.textContent='Cap. 2 →';nextBtn.style.display='block';
  } else if(ch===2){
    ch2Layer.addTo(map);
    btns[1].classList.add('active-ch');
    map.setView([45.4600,12.3700],12);
    legend.innerHTML='<div class="li"><div class="ld lb"></div>Tappe del viaggio</div>';
    document.querySelector('.hl h1').textContent="Cap. 2 · Don't Puke!";
    document.querySelector('.hl p').textContent='Viaggio in barca · La Laguna';
    nextBtn.textContent='Cap. 3 →';nextBtn.style.display='block';
  } else if(ch===3){
    ch3Layer.addTo(map);
    btns[2].classList.add('active-ch');
    map.setView([45.4370,12.3310],14);
    legend.innerHTML='<div class="li"><div class="ld lg"></div>Palazzi storici</div>';
    document.querySelector('.hl h1').textContent='Cap. 3 · Queen of Venice';
    document.querySelector('.hl p').textContent='I palazzi del Canal Grande';
    nextBtn.textContent='← Cap. 1';nextBtn.style.display='block';
  } else {
    // Show all
    ch1Layer.addTo(map);ch2Layer.addTo(map);ch3Layer.addTo(map);
    btns[3].classList.add('active-ch');
    map.setView([45.4460,12.3350],13);

    document.querySelector('.hl h1').textContent='Mappa Completa';
    document.querySelector('.hl p').textContent='Tutti i capitoli · Venezia';
    nextBtn.style.display='none';
  }
}

function goNextChapter(){

// === GEOLOCATION ===
(function(){
  var geoBtn=document.getElementById('geoBtn');
  var geoMarker=null,geoCircle=null,watchId=null;
  var tracking=false;

  function createGeoMarker(lat,lng,acc){
    if(geoCircle) map.removeLayer(geoCircle);
    geoCircle=L.circle([lat,lng],{radius:acc,color:'#ff4757',fillColor:'#ff4757',fillOpacity:0.06,weight:1,opacity:0.25}).addTo(map);
    if(geoMarker) map.removeLayer(geoMarker);
    var dot=L.divIcon({html:'<div style="width:16px;height:16px;background:#ff4757;border:3px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(255,71,87,0.7),0 0 24px rgba(255,71,87,0.3);animation:geoDot 2s ease-in-out infinite"></div><style>@keyframes geoDot{0%,100%{box-shadow:0 0 12px rgba(255,71,87,0.7),0 0 24px rgba(255,71,87,0.3)}50%{box-shadow:0 0 18px rgba(255,71,87,0.9),0 0 36px rgba(255,71,87,0.5)}}</style>',className:'',iconSize:[16,16],iconAnchor:[8,8]});
    geoMarker=L.marker([lat,lng],{icon:dot,zIndexOffset:1000}).addTo(map);
  }

  function onPosition(pos){
    var lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy;
    createGeoMarker(lat,lng,acc);
    geoBtn.classList.remove('searching');
    geoBtn.classList.add('active');
    geoBtn.textContent='◉';
    map.setView([lat,lng],Math.max(map.getZoom(),16),{animate:true});
  }

  function onError(){
    geoBtn.classList.remove('searching','active');
    geoBtn.textContent='◎';
    tracking=false;
    if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  }

  geoBtn.addEventListener('click',function(){
    if(!navigator.geolocation) return;
    if(tracking){
      tracking=false;
      if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
      if(geoMarker){map.removeLayer(geoMarker);geoMarker=null;}
      if(geoCircle){map.removeLayer(geoCircle);geoCircle=null;}
      geoBtn.classList.remove('searching','active');
      geoBtn.textContent='◎';
      return;
    }
    tracking=true;
    geoBtn.classList.add('searching');
    geoBtn.textContent='◎';
    watchId=navigator.geolocation.watchPosition(onPosition,onError,{enableHighAccuracy:true,maximumAge:10000,timeout:15000});
  });
})();

  function getTarget(){
    var t=new Date();
    t.setHours(16,0,0,0);
    return t;
  }

  // Timer marker on the map at Riva degli Schiavoni
  var timerMarkerIcon=L.divIcon({html:'<div class="timer-marker">⏱ 16:00</div>',className:'',iconSize:[70,20],iconAnchor:[35,25]});
  var timerMapMarker=L.marker([45.4330,12.3425],{icon:timerMarkerIcon,zIndexOffset:500,interactive:false});
  ch1Layer.addLayer(timerMapMarker);
  ch2Layer.addLayer(timerMapMarker);

  function updateTimer(){
    var now=new Date();
    var target=getTarget();
    var diff=target.getTime()-now.getTime();

    timerBox.style.display='block';

    if(diff<=0){
      // Time expired
      timerBox.classList.add('expired');
      timerCount.textContent='SCADUTO';
      timerLabel.textContent='Riva degli Schiavoni · ore 16:00';
      return;
    }

    timerBox.classList.remove('expired');
    var totalMin=Math.floor(diff/60000);
    var hours=Math.floor(totalMin/60);
    var mins=totalMin%60;
    var secs=Math.floor((diff%60000)/1000);

    if(hours>0){
      timerCount.textContent=hours+'h '+String(mins).padStart(2,'0')+'m '+String(secs).padStart(2,'0')+'s';
    } else {
      timerCount.textContent=mins+'m '+String(secs).padStart(2,'0')+'s';
    }

    // Update map marker too
    var markerText=hours>0 ? '⏱ -'+hours+'h'+String(mins).padStart(2,'0') : '⏱ -'+mins+'m'+String(secs).padStart(2,'0')+'s';
    timerMapMarker.setIcon(L.divIcon({html:'<div class="timer-marker">'+markerText+'</div>',className:'',iconSize:[90,20],iconAnchor:[45,25]}));
  }

  updateTimer();
  setInterval(updateTimer,1000);
})();

// Load agent name from start page
(function(){
  var name=localStorage.getItem('agentName');
  if(name){document.querySelector('.nom').textContent=name;}
})();
</script>
</body>
