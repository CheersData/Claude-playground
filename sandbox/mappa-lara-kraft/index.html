<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mappa di Lara Kraft</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e0d0;font-family:'Montserrat',sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(180,150,80,0.2);background:rgba(10,10,15,0.98);z-index:1000;flex-shrink:0}
.hl h1{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;letter-spacing:3px;color:#c8a84b;text-transform:uppercase}
.hl p{font-size:8px;letter-spacing:2px;color:rgba(200,168,75,0.4);text-transform:uppercase;margin-top:2px}
.hr{text-align:right}
.hr .ded{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:rgba(232,224,208,0.4)}
.hr .nom{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:#c8a84b;letter-spacing:2px}
#legend{position:absolute;top:62px;left:14px;background:rgba(10,10,15,0.9);border:1px solid rgba(200,168,75,0.18);padding:8px 12px;z-index:900;display:flex;flex-direction:column;gap:6px;border-radius:4px}
.li{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(232,224,208,0.55)}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lg{background:#c8a84b;box-shadow:0 0 6px rgba(200,168,75,0.4)}
.lb{background:#4a9eca;box-shadow:0 0 6px rgba(74,158,202,0.4)}
#counter{position:absolute;top:62px;right:14px;background:rgba(10,10,15,0.9);border:1px solid rgba(200,168,75,0.18);padding:6px 12px;z-index:900;text-align:center;border-radius:4px}
#cn{font-family:'Cormorant Garamond',serif;font-size:20px;color:#c8a84b;line-height:1}
#cl{font-size:7px;letter-spacing:2px;color:rgba(200,168,75,0.38);text-transform:uppercase}
#map{flex:1;width:100%}

/* === PANEL === */
#panel{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(135deg,rgba(12,12,18,0.99),rgba(16,12,8,0.99));transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.16,1,0.3,1);z-index:1000;border-top:1px solid rgba(180,150,80,0.22);backdrop-filter:blur(16px);max-height:50vh;overflow:hidden;display:flex}
#panel.visible{transform:translateY(0)}
#panel.bt{border-top-color:rgba(74,158,202,0.35)}
#piw{width:200px;min-width:200px;overflow:hidden;flex-shrink:0;background:#0f0f18;display:flex;align-items:center;justify-content:center;position:relative}
#pi{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.85) saturate(0.9)}
#pico{font-size:48px;color:rgba(200,168,75,0.15);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#pc{padding:18px 32px 18px 20px;flex:1;overflow-y:auto;position:relative}
#ptag{display:inline-block;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;padding:2px 8px;margin-bottom:8px;font-weight:500}
.tg{background:rgba(200,168,75,0.12);color:#c8a84b;border:1px solid rgba(200,168,75,0.25)}
.tb{background:rgba(74,158,202,0.12);color:#4a9eca;border:1px solid rgba(74,158,202,0.25)}
#ptit{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:#f0e8d8;margin-bottom:2px;letter-spacing:1px;line-height:1.15}
#psub{font-size:9px;letter-spacing:2px;color:rgba(200,168,75,0.5);text-transform:uppercase;margin-bottom:14px;font-weight:300}
#ptxt{font-size:12.5px;line-height:1.82;color:rgba(232,224,208,0.72);font-weight:300}
#pcl{position:absolute;top:14px;right:14px;background:none;border:1px solid rgba(200,168,75,0.22);color:#c8a84b;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;border-radius:2px;z-index:10}
#pcl:hover{background:rgba(200,168,75,0.1);border-color:#c8a84b}
#hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(10,10,15,0.85);border:1px solid rgba(200,168,75,0.15);padding:7px 16px;font-size:9px;letter-spacing:2px;color:rgba(200,168,75,0.45);text-transform:uppercase;z-index:900;pointer-events:none;transition:opacity 0.5s;white-space:nowrap}
#hint.hidden{opacity:0}

/* === MARKERS === */
.pm{width:30px;height:30px;position:relative;cursor:pointer}
.pm-r{width:20px;height:20px;border-radius:50%;border:2px solid rgba(200,168,75,0.45);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:all 0.25s}
.pm-c{width:9px;height:9px;background:#c8a84b;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(200,168,75,0.5);transition:all 0.25s}
.pm-l{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Cormorant Garamond',serif;font-size:12px;color:#c8a84b;pointer-events:none;opacity:0;transition:opacity 0.2s;background:rgba(8,8,14,0.9);padding:2px 8px;border:1px solid rgba(200,168,75,0.18)}
.pm:hover .pm-r,.pm.active .pm-r{border-color:#c8a84b;width:26px;height:26px;box-shadow:0 0 10px rgba(200,168,75,0.3)}
.pm:hover .pm-c,.pm.active .pm-c{background:#fff8e0;box-shadow:0 0 14px rgba(255,248,224,0.7)}
.pm:hover .pm-l{opacity:1}
.bm{width:30px;height:30px;position:relative;cursor:pointer}
.bm-r{width:22px;height:22px;border-radius:50%;border:2px solid rgba(74,158,202,0.5);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:all 0.25s}
.bm-c{width:10px;height:10px;background:#4a9eca;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(74,158,202,0.5);transition:all 0.25s}
.bm-l{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Cormorant Garamond',serif;font-size:12px;color:#4a9eca;pointer-events:none;opacity:0;transition:opacity 0.2s;background:rgba(8,8,14,0.9);padding:2px 8px;border:1px solid rgba(74,158,202,0.2)}
.bm:hover .bm-r,.bm.active .bm-r{border-color:#4a9eca;width:28px;height:28px;box-shadow:0 0 10px rgba(74,158,202,0.3)}
.bm:hover .bm-c,.bm.active .bm-c{background:#a8d8f0;box-shadow:0 0 14px rgba(168,216,240,0.6)}
.bm:hover .bm-l{opacity:1}

/* === MAP STYLE === */
.leaflet-container{background:#10101a}
.leaflet-tile{filter:brightness(0.62) saturate(0.3) hue-rotate(200deg)}
.leaflet-control-zoom{border:1px solid rgba(200,168,75,0.18)!important;border-radius:0!important}
.leaflet-control-zoom a{background:rgba(10,10,15,0.95)!important;color:#c8a84b!important;border-color:rgba(200,168,75,0.12)!important;border-radius:0!important;width:36px!important;height:36px!important;line-height:36px!important;font-size:18px!important}
.leaflet-control-attribution{display:none}

/* === MOBILE === */
@media(max-width:600px){
  header{padding:8px 12px;gap:2px}
  .hl h1{font-size:14px;letter-spacing:2px}
  .hl p{font-size:7px;letter-spacing:1.5px}
  .hr .ded{font-size:9px}
  .hr .nom{font-size:13px;letter-spacing:1px}

  #legend{top:auto;bottom:55px;left:8px;padding:5px 8px;gap:4px}
  .li{font-size:7px;letter-spacing:1px;gap:5px}
  .ld{width:8px;height:8px}

  #counter{top:auto;bottom:55px;right:8px;padding:4px 8px}
  #cn{font-size:16px}
  #cl{font-size:6px}

  #hint{bottom:12px;font-size:7px;letter-spacing:1.5px;padding:5px 12px}

  #panel{flex-direction:column;max-height:70vh;overflow-y:auto}
  #piw{width:100%;min-width:unset;height:160px;flex-shrink:0}
  #pi{width:100%;height:160px;object-fit:cover}
  #pc{padding:14px 16px 24px 14px}
  #ptit{font-size:20px}
  #psub{font-size:8px;margin-bottom:10px}
  #ptxt{font-size:11.5px;line-height:1.7}
  #pcl{top:10px;right:10px;width:34px;height:34px;font-size:18px;background:rgba(10,10,15,0.85);border-color:rgba(200,168,75,0.4)}

  .pm-l,.bm-l{display:none}

  .leaflet-control-zoom a{width:40px!important;height:40px!important;line-height:40px!important;font-size:20px!important}
}

@media(max-width:380px){
  header{flex-direction:column;align-items:flex-start;gap:2px}
  .hr{text-align:left}
  .hl h1{font-size:12px;letter-spacing:1.5px}
  .hr .nom{font-size:11px}
  .hr .ded{font-size:8px}
  #piw,#pi{height:120px}
  #ptit{font-size:18px}
}
</style>
</head>
<body>
<header>
  <div class="hl">
    <h1>Canal Grande · Laguna</h1>
    <p>Viaggio di ritorno · 13 marzo</p>
  </div>
  <div class="hr">
    <div class="ded">per i suoi 34 anni —</div>
    <div class="nom">Lara Kraft</div>
  </div>
</header>
<div id="map"></div>
<div id="legend">
  <div class="li"><div class="ld lg"></div>Palazzi storici</div>
  <div class="li"><div class="ld lb"></div>Tappe del viaggio</div>
</div>
<div id="counter"><div id="cn">0</div><div id="cl">visitati</div></div>
<div id="hint">Tocca un punto per scoprirlo</div>
<div id="panel">
  <div id="piw">
    <img id="pi" src="" alt="" referrerpolicy="no-referrer" crossorigin="anonymous" style="display:none">
    <span id="pico">◈</span>
  </div>
  <div id="pc">
    <button id="pcl">×</button>
    <div id="ptag"></div>
    <div id="ptit"></div>
    <div id="psub"></div>
    <div id="ptxt"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const stops=[
  {name:"Mazzorbo",sub:"La vostra isola · Partenza ore 17:00",lat:45.4842,lng:12.3538,emoji:"⚓",
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Mazzorbo_Canal.jpg?width=640",
   text:"La vostra isola. Collegata a Burano da un ponte di legno medievale, Mazzorbo è quasi disabitata — poche centinaia di residenti, orti, silenzio totale. Il vigneto di Venissa produce la Dorona, un vitigno veneziano quasi estinto riscoperto negli anni 2000. Da qui partite il 13 marzo alle 17:00 sul taxi acqueo verso Venezia."},
  {name:"Burano",sub:"Isola delle case colorate",lat:45.4852,lng:12.4167,emoji:"🏠",
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Burano_02.jpg?width=640",
   text:"L'isola più fotogenica della laguna. Le case colorate non sono una trovata turistica: ogni famiglia dipingeva la propria in un colore diverso per riconoscerla dalla barca nelle nebbie invernali. La tradizione del merletto di Burano risale al XVI secolo — la regina Caterina de' Medici ne era cliente. La sera della proposta passeggerete qui sotto le luci."},
  {name:"Murano",sub:"Laguna nord · Vetro soffiato",lat:45.4583,lng:12.3535,emoji:"💎",
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Murano_veduta.jpg?width=640",
   text:"Nel 1291 la Repubblica ordinò a tutti i maestri vetrai di trasferirsi a Murano — per controllare i segreti della lavorazione. Per secoli erano gli unici al mondo capaci di produrre certi tipi di vetro. Avevano il privilegio di portare la spada e di sposare nobili veneziane. I segreti erano protetti con la vita — letteralmente."},
  {name:"Fondamenta Nuove",sub:"Ingresso nord di Venezia",lat:45.4458,lng:12.3360,emoji:"🚢",
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Venezia_Fondamente_Nuove.jpg?width=640",
   text:"Il punto dove il taxi entra nel corpo di Venezia dalla laguna nord. Da qui si vede l'isola di San Michele — il cimitero di Venezia, un'isola intera dedicata ai morti con i cipressi che si stagliano sull'acqua. Stravinsky, Diaghilev e Ezra Pound sono sepolti qui."},
  {name:"Ghetto Ebraico",sub:"Cannaregio · XVI secolo",lat:45.4442,lng:12.3273,emoji:"✡",
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Ghetto_venezia.jpg?width=640",
   text:"Il primo ghetto della storia — la parola stessa viene da 'geto', la fonderia che c'era qui. Dal 1516 gli ebrei veneziani furono confinati in questa piccola isola, le porte chiuse la notte, le case sopraelevate fino a 7 piani per mancanza di spazio. Shakespeare ambientò qui Il Mercante di Venezia, con Shylock come protagonista."},
  {name:"Stazione Santa Lucia",sub:"Capolinea del Canal Grande",lat:45.4413,lng:12.3213,emoji:"🚂",
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Venezia_-_Stazione_di_Santa_Lucia_(2013).jpg?width=640",
   text:"L'unica stazione al mondo dove esci e sei direttamente sul Canal Grande. Inaugurata nel 1954. Davanti c'è il Ponte degli Scalzi, uno dei quattro ponti sul Canal Grande. Da qui il taxi scende verso Riva degli Schiavoni."},
  {name:"Riva degli Schiavoni",sub:"Arrivo · Bacino di San Marco",lat:45.4335,lng:12.3425,emoji:"🏁",
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Riva_degli_Schiavoni_(Venice).jpg?width=640",
   text:"Il vostro punto di arrivo, davanti all'Hotel Metropole. La Riva prende il nome dalle navi slave che qui attraccavano nel Medioevo. Da qui si vede la Basilica di San Marco, il Palazzo Ducale e, in lontananza, San Giorgio Maggiore. È il cartolina più famosa di Venezia — e il punto da cui avete iniziato il viaggio 24 ore prima."}
];
const palaces=[
  {n:"01",name:"Punta della Dogana",sub:"XVII sec. · Dogana da Mar",lat:45.4308,lng:12.3365,
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Punta_della_dogana_vue_de_face.jpg?width=640",
   text:"Il triangolo di pietra che separa il Canal Grande dal Canale della Giudecca. Era la dogana marittima: ogni nave doveva fermarsi e pagare i dazi. Sulla sommità, una sfera dorata sorretta da due Atlanti e la Fortuna che ruota col vento. Oggi è uno dei musei d'arte contemporanea più importanti d'Europa, collezione Pinault."},
  {n:"02",name:"Santa Maria della Salute",sub:"1631 · Baldassarre Longhena",lat:45.4312,lng:12.3340,
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Basilica_di_Santa_Maria_della_Salute_(Venice).jpg?width=640",
   text:"La più bella chiesa barocca di Venezia, costruita come voto alla Madonna dopo la peste del 1630 che uccise un terzo della popolazione. L'enorme cupola ottagonale con le volute a spirale — le 'orecchie' — la rendono inconfondibile da qualsiasi angolo della laguna."},
  {n:"03",name:"Palazzo Venier dei Leoni",sub:"XVIII sec. · Guggenheim",lat:45.4315,lng:12.3318,
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Peggy_Guggenheim_Collection_Canal_Grande.jpg?width=640",
   text:"Il 'palazzo nonfinito' — costruito solo al pianterreno, nessuno sa perché i lavori si fermarono nel 1749. Dal 1951 fu la residenza di Peggy Guggenheim, che lo trasformò in uno dei musei d'arte moderna più importanti al mondo. Sul terrazzo c'è l'Angelo della Città di Marino Marini, orientato verso i gondolieri."},
  {n:"04",name:"Palazzo Dario",sub:"1487 · Pietro Lombardo",lat:45.4318,lng:12.3308,
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Palazzo_Dario_-_Venice_(composite).jpg?width=640",
   text:"Il palazzo più maledetto di Venezia. Quasi tutti i proprietari nel corso dei secoli sono morti in circostanze tragiche. L'ultimo — il magnate Raul Gardini — si suicidò nel 1993. La facciata asimmetrica in marmo policromo è tra le più belle del Rinascimento veneziano."},
  {n:"05",name:"Ca' Rezzonico",sub:"XVII–XVIII sec. · Longhena e Massari",lat:45.4332,lng:12.3262,
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Ca'_rezzonico_facade.jpg?width=640",
   text:"Iniziato nel 1649 e terminato quasi un secolo dopo. Qui morì Robert Browning nel 1889. Ospita il Museo del Settecento Veneziano, con gli affreschi di Tiepolo e una ricostruzione perfetta di come viveva la nobiltà veneziana nel suo ultimo secolo di splendore."},
  {n:"06",name:"Palazzo Grassi",sub:"1749 · Giorgio Massari",lat:45.4340,lng:12.3270,
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Palazzo_Grassi_Venice_(cropped).jpg?width=640",
   text:"L'ultimo grande palazzo costruito prima della caduta della Repubblica. Neoclassico, rigoroso — quasi austero rispetto ai vicini barocchi. Oggi è di François Pinault: Koons, Cattelan, Murakami hanno esposto qui."},
  {n:"07",name:"Ca' Foscari",sub:"1452 · Gotico veneziano",lat:45.4358,lng:12.3298,
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Ca'_Foscari_Venice.jpg?width=640",
   text:"Capolavoro del gotico veneziano, costruito per il Doge Francesco Foscari nel 1452. Foscari governò per 34 anni ma fu costretto ad abdicare dal Consiglio dei Dieci — e morì pochi giorni dopo. Oggi è la sede principale dell'Università Ca' Foscari."},
  {n:"08",name:"Ponte di Rialto",sub:"1591 · Antonio da Ponte",lat:45.4380,lng:12.3360,
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Rialto_bridge_at_night.jpg?width=640",
   text:"Per quasi trecento anni l'unico ponte sul Canal Grande. Antonio da Ponte vinse il concorso battendo Michelangelo, Palladio e Sansovino. 'Rialto' deriva da 'Rivo Alto', la prima zona abitata di Venezia. Sotto le arcate ci sono ancora le botteghe che ci sono sempre state."},
  {n:"09",name:"Ca' d'Oro",sub:"1428 · Gotico Fiorito",lat:45.4402,lng:12.3338,
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Ca_d'oro_1.jpg?width=640",
   text:"La 'Casa d'Oro' — il palazzo più fotografato del Canal Grande. Nel '400 la facciata era ricoperta di foglia d'oro, lapislazzuli e vermiglio. Oggi il colore è andato ma la struttura gotica è rimasta intatta. Ospita la Galleria Franchetti, con Mantegna, Tiziano e Van Eyck."},
  {n:"10",name:"Ca' Pesaro",sub:"1710 · Baldassarre Longhena",lat:45.4418,lng:12.3255,
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Ca'_Pesaro_Venice_2019.jpg?width=640",
   text:"Ultimo capolavoro barocco di Longhena — i mascheroni tra le finestre sono tra i dettagli più elaborati del Canal Grande. Qui si svolse l'ultimo ballo della nobiltà veneziana prima della caduta della Repubblica, nel 1797."},
  {n:"11",name:"Palazzo Vendramin Calergi",sub:"1509 · Mauro Codussi",lat:45.4438,lng:12.3235,
   img:"https://commons.wikimedia.org/wiki/Special:FilePath/Palazzo_Vendramin_Calergi_Venice.jpg?width=640",
   text:"Il primo palazzo rinascimentale del Canal Grande. Le grandi bifore ad arco tondo sostituiscono le ogive gotiche: il capolavoro della transizione dal Medioevo al Rinascimento. Qui morì Richard Wagner nel 1883 — la camera è rimasta intatta. Oggi ospita il Casinò di Venezia."}
];

const map=L.map('map',{center:[45.4460,12.3350],zoom:14,zoomControl:true,tap:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

const panel=document.getElementById('panel'),
      hint=document.getElementById('hint'),
      pi=document.getElementById('pi'),
      pico=document.getElementById('pico'),
      piw=document.getElementById('piw');
let activeEl=null,visited=0;

function loadImage(url, emoji) {
  // Reset state
  pi.style.display='none';
  pico.style.display='block';
  pico.textContent=emoji||'◈';

  if(!url) return;

  // Directly assign to the img element (which has referrerpolicy="no-referrer")
  pi.onload = function(){
    pi.style.display='block';
    pico.style.display='none';
  };
  pi.onerror = function(){
    pi.style.display='none';
    pico.style.display='block';
  };
  pi.src = url;
}

function show(d,el,blue){
  document.getElementById('ptag').textContent=blue?'● Tappa viaggio':'Palazzo '+d.n+' · di '+palaces.length;
  document.getElementById('ptag').className=blue?'tb':'tg';
  document.getElementById('ptit').textContent=d.name;
  document.getElementById('psub').textContent=d.sub;
  document.getElementById('ptxt').textContent=d.text;
  panel.className=blue?'visible bt':'visible';

  loadImage(d.img, d.emoji);

  hint.classList.add('hidden');
  if(activeEl) activeEl.classList.remove('active');
  el.classList.add('active');
  activeEl=el;
  if(!el.dataset.seen){el.dataset.seen='1';visited++;document.getElementById('cn').textContent=visited;}
  map.panTo([d.lat,d.lng],{animate:true,duration:0.5});
}

document.getElementById('pcl').addEventListener('click',function(){
  panel.classList.remove('visible','bt');
  if(activeEl){activeEl.classList.remove('active');activeEl=null;}
});

// Close panel on map click
map.on('click', function(){
  panel.classList.remove('visible','bt');
  if(activeEl){activeEl.classList.remove('active');activeEl=null;}
});

// Swipe down to close panel on mobile
(function(){
  var startY=0,moving=false;
  panel.addEventListener('touchstart',function(e){
    startY=e.touches[0].clientY;
    moving=true;
  },{passive:true});
  panel.addEventListener('touchmove',function(e){
    if(!moving) return;
    var dy=e.touches[0].clientY-startY;
    if(dy>60){
      panel.classList.remove('visible','bt');
      if(activeEl){activeEl.classList.remove('active');activeEl=null;}
      moving=false;
    }
  },{passive:true});
  panel.addEventListener('touchend',function(){moving=false;},{passive:true});
})();

function addMarker(d,cls,blue){
  var inner=cls==='pm'
    ?'<div class="pm-r"></div><div class="pm-c"></div><div class="pm-l">'+d.name+'</div>'
    :'<div class="bm-r"></div><div class="bm-c"></div><div class="bm-l">'+d.name+'</div>';
  var wrap=document.createElement('div');
  wrap.className=cls;
  wrap.innerHTML=inner;
  var icon=L.divIcon({html:wrap.outerHTML,className:'',iconSize:[30,30],iconAnchor:[15,15]});
  var m=L.marker([d.lat,d.lng],{icon:icon}).addTo(map);
  m.on('click',function(){show(d,this.getElement().querySelector('.'+cls),blue);});
}

palaces.forEach(function(p){addMarker(p,'pm',false);});
stops.forEach(function(s){addMarker(s,'bm',true);});
</script>
</body>
</html>
