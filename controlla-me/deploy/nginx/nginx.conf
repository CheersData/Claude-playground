# =============================================================================
# nginx.conf — Reverse proxy for controlla.me + poimandres.work
# SSL termination via Let's Encrypt (certbot)
# Target: Hetzner CX21 (2 vCPU, 4GB RAM)
# =============================================================================

# Worker processes — auto = number of CPU cores (2 on CX21)
worker_processes auto;
worker_rlimit_nofile 8192;

error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 25m;    # Slightly above app's 20MB file upload limit

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/x-javascript
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Rate limiting zones
    # -------------------------------------------------------------------------
    # General: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # API: 5 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
    # Uploads: 2 req/s per IP
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=2r/s;

    # -------------------------------------------------------------------------
    # Upstream — Next.js app running in Docker
    # -------------------------------------------------------------------------
    upstream nextjs {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP → HTTPS redirect (all domains)
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name controlla.me www.controlla.me poimandres.work www.poimandres.work;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # controlla.me — Main application (HTTPS)
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name controlla.me www.controlla.me;

        # SSL certificates (managed by certbot)
        ssl_certificate /etc/letsencrypt/live/controlla.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/controlla.me/privkey.pem;
        include /etc/nginx/snippets/ssl-params.conf;

        # www → non-www redirect
        if ($host = www.controlla.me) {
            return 301 https://controlla.me$request_uri;
        }

        # Security headers (supplement those set by Next.js)
        add_header X-Robots-Tag "index, follow" always;

        # ---- Static assets (Next.js _next/static) ----
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ---- Public files (favicon, videos, images) ----
        location /public/ {
            proxy_pass http://nextjs;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # ---- API routes ----
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support — disable buffering for streaming responses
            proxy_buffering off;
            proxy_cache off;

            # Long timeout for analysis pipeline (5 min)
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ---- Upload endpoint (stricter rate limit) ----
        location /api/upload {
            limit_req zone=uploads burst=5 nodelay;
            client_max_body_size 25m;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Webhook endpoints (Stripe — no rate limit, validated by signature) ----
        location /api/webhook {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- All other routes (Next.js pages) ----
        location / {
            limit_req zone=general burst=30 nodelay;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # -------------------------------------------------------------------------
    # poimandres.work — Console/Ops domain (HTTPS)
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name poimandres.work www.poimandres.work;

        # SSL certificates (managed by certbot)
        ssl_certificate /etc/letsencrypt/live/poimandres.work/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/poimandres.work/privkey.pem;
        include /etc/nginx/snippets/ssl-params.conf;

        # www → non-www redirect
        if ($host = www.poimandres.work) {
            return 301 https://poimandres.work$request_uri;
        }

        # Security: no search engine indexing for ops domain
        add_header X-Robots-Tag "noindex, nofollow" always;

        # All requests go to Next.js (rewrites handle /console mapping)
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
